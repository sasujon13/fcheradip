<div class="login_signup_form">
  <h2>Password Update</h2>
  <form [formGroup]="authForm" (ngSubmit)="onAuth()">
    <div class="form-group">
      <span class="label-colon"><label for="username">Mobile No</label><span class="colon">:</span></span>
      <div class="form-field">
        <input type="text" class="form-control" id="username" [(ngModel)]="username" formControlName="username"
          [readonly]="true" [disabled]="true"
          style="user-select: none; pointer-events: none; text-align: center;" *ngIf="username"
          [value]="username" />
      </div>
    </div>
    <div class="form-group">
      <span class="label-colon"><label for="password">Old Password</label><span class="colon">:</span></span>
      <div class="form-field">
        <div class="password-input-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" formControlName="password" id="password"
            placeholder="Enter old password"
            class="form-control"
            [ngClass]="{ 'is-invalid': authForm.get('password')?.touched && authForm.get('password')?.invalid }" />
          <button type="button" class="toggle-password" (click)="togglePasswordVisibility()" title="Show/hide password">
            <i class="fa {{ showPassword ? 'fa-eye-slash' : 'fa-eye' }}"></i>
          </button>
        </div>
        <div *ngIf="isPasswordMismatch" class="error-message">
          Your Password doesn't match. Please try again or <a [routerLink]="['']" routerLinkActive="reset">Reset</a>
          password / <a [routerLink]="['/auth']" routerLinkActive="auth">Signup</a> with a different Mobile number!
        </div>
        <div *ngIf="isPasswordLength" class="error-message">
          Password must be within 6 - 14 Characters.
        </div>
      </div>
    </div>
    <div class="form-group">
      <span class="label-colon"><label for="newpassword">New Password</label><span class="colon">:</span></span>
      <div class="form-field">
        <div class="password-input-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" formControlName="newpassword" id="newpassword"
            placeholder="Enter new password"
            class="form-control"
            [ngClass]="{ 'is-invalid': authForm.get('newpassword')?.touched && authForm.get('newpassword')?.invalid }" />
          <button type="button" class="toggle-password" (click)="togglePasswordVisibility()" title="Show/hide password">
            <i class="fa {{ showPassword ? 'fa-eye-slash' : 'fa-eye' }}"></i>
          </button>
        </div>
        <div *ngIf="isPasswordLength2" class="error-message">
          Password must be within 6 - 14 Characters.
        </div>
      </div>
    </div>
    <div class="form-group">
      <span class="label-colon"><label for="confirmpassword">Confirm Password</label><span class="colon">:</span></span>
      <div class="form-field">
        <div class="password-input-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" formControlName="confirmpassword" id="confirmpassword"
            placeholder="Confirm new password"
            class="form-control"
            [ngClass]="{ 'is-invalid': authForm.get('confirmpassword')?.touched && authForm.get('confirmpassword')?.invalid }" />
          <button type="button" class="toggle-password" (click)="togglePasswordVisibility()" title="Show/hide password">
            <i class="fa {{ showPassword ? 'fa-eye-slash' : 'fa-eye' }}"></i>
          </button>
        </div>
        <div *ngIf="isPasswordMismatch3" class="error-message">
          Your Password doesn't match. Please try again!
        </div>
      </div>
    </div>

    <div #consoleOutput class="console-output"></div>
    <button type="submit" class="form-submit-btn">Update</button>
  </form>
</div>
