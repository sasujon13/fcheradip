<div class="question-form-container">
  <form [formGroup]="questionForm" (ngSubmit)="onSubmit()">
    <div class="form-section">
      <h3>Basic Information</h3>
      
      <div class="form-group">
        <label>Question Type <span class="required">*</span></label>
        <div class="type-options">
          <label>
            <input type="radio" formControlName="type" value="MCQ">
            MCQ
          </label>
          <label>
            <input type="radio" formControlName="type" value="CQ">
            CQ
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Subject <span class="required">*</span></label>
        <input type="text" formControlName="subject" [readonly]="true" class="form-control">
      </div>

      <div class="form-group">
        <label>Chapter <span class="required">*</span></label>
        <input type="text" formControlName="chapter" [readonly]="true" class="form-control">
      </div>

      <div class="form-group">
        <label>Question Number <span class="required">*</span></label>
        <input type="text" formControlName="number" class="form-control">
      </div>

      <div class="form-group">
        <label>Marks <span class="required">*</span></label>
        <input type="number" formControlName="marks" min="1" class="form-control">
      </div>
    </div>

    <div class="form-section">
      <h3>Question Content</h3>
      <app-questioneditor formControlName="text"></app-questioneditor>
    </div>

    <div class="form-section" *ngIf="questionForm.get('type')?.value === 'MCQ'">
      <h3>MCQ Options</h3>
      <app-mcqoptions formControlName="options"></app-mcqoptions>
    </div>

    <div class="form-section">
      <h3>Answer & Explanation</h3>
      <div class="form-group">
        <label>Answer</label>
        <textarea formControlName="answer" class="form-control" rows="4"></textarea>
      </div>
      <div class="form-group">
        <label>Explanation</label>
        <app-questioneditor formControlName="explanation"></app-questioneditor>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="onCancel()">Cancel</button>
      <button type="submit" class="btn-primary" [disabled]="!questionForm.valid">Save</button>
    </div>
  </form>
</div>
