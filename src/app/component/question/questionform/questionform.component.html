<div class="question-form-container">
  <form [formGroup]="questionForm" (ngSubmit)="onSubmit()">
    <div class="form-section">
      <h3>Basic Information</h3>
      
      <div class="form-group">
        <label>Question Type <span class="required">*</span></label>
        <div class="type-options">
          <label>
            <input type="radio" formControlName="type" value="MCQ">
            MCQ
          </label>
          <label>
            <input type="radio" formControlName="type" value="CQ">
            CQ
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Subject <span class="required">*</span></label>
        <input type="text" formControlName="subject" [readonly]="true" class="form-control">
      </div>

      <div class="form-group" *ngIf="isNewMode && chapters.length > 0">
        <label>Chapter <span class="required">*</span></label>
        <select class="form-control" formControlName="chapter" (change)="onChapterSelect($any($event.target).value)">
          <option value="">Select Chapter</option>
          <option *ngFor="let ch of chapters" [value]="ch.id">{{ ch.name }}</option>
        </select>
      </div>
      <div class="form-group" *ngIf="!isNewMode || chapters.length === 0">
        <label>Chapter <span class="required">*</span></label>
        <input type="text" formControlName="chapter" [readonly]="true" class="form-control">
      </div>

      <div class="form-group" *ngIf="isNewMode">
        <label>Topic <span class="required">*</span></label>
        <select class="form-control" formControlName="topic" (change)="onTopicSelect($any($event.target).value)">
          <option value="">Select Topic</option>
          <option *ngFor="let t of topics" [value]="t.id">{{ t.name }}</option>
          <option *ngIf="isTopicValueNotInList()" [value]="questionForm.get('topic')?.value">{{ questionForm.get('topic')?.value }}</option>
          <option [value]="ADD_NEW_TOPIC_ID">+ Add new topic</option>
        </select>
        <div class="form-group new-topic-inline" *ngIf="showNewTopicInput">
          <label>New topic name</label>
          <input type="text" class="form-control" [(ngModel)]="newTopicName" [ngModelOptions]="{standalone: true}" placeholder="Enter topic name" (keyup.enter)="confirmNewTopic()">
          <button type="button" class="btn-secondary btn-sm" (click)="confirmNewTopic()">Add topic</button>
        </div>
      </div>

      <div class="form-group">
        <label>Question Number</label>
        <input type="text" formControlName="number" class="form-control">
      </div>

      <div class="form-group">
        <label>Marks <span class="required">*</span></label>
        <input type="number" formControlName="marks" min="1" class="form-control">
      </div>
    </div>

    <div class="form-section">
      <h3>Question Content</h3>
      <app-questioneditor formControlName="text"></app-questioneditor>
    </div>

    <div class="form-section" *ngIf="questionForm.get('type')?.value === 'MCQ'">
      <h3>MCQ Options</h3>
      <app-mcqoptions formControlName="options"></app-mcqoptions>
    </div>

    <div class="form-section">
      <h3>Answer & Explanation</h3>
      <div class="form-group">
        <label>Answer</label>
        <textarea formControlName="answer" class="form-control" rows="4"></textarea>
      </div>
      <div class="form-group">
        <label>Explanation</label>
        <app-questioneditor formControlName="explanation"></app-questioneditor>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="onCancel()">Cancel</button>
      <button type="submit" class="btn-primary" [disabled]="!questionForm.valid">Save</button>
    </div>
  </form>
</div>
