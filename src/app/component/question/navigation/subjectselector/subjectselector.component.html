<div class="subject-selector-container">
  <label class="subject-label">Subject</label>
  <select
    class="subject-select"
    [value]="currentSubject"
    (change)="onSelect($any($event.target).value)"
  >
    <option value="">Select Subject</option>
    <option *ngFor="let subject of subjects" [value]="subject.subject_tr || subject.id || subject.name">
      {{ subject.name }}
    </option>
  </select>
</div>
