<div class="search-bar-container">
  <input 
    type="text" 
    class="search-input"
    placeholder="Search questions..."
    [(ngModel)]="searchTerm"
    (input)="onInputChange()"
  >
  <button type="button" class="search-btn" (click)="onSearch()">
    <i class="fa fa-search"></i>
  </button>
</div>
