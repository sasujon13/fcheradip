<div class="question-container">
  <!-- Single-line filter row (like institute: division, district, thana); wraps and centers -->
  <div class="question-filter-row">
    <div class="question-filter-item">
      <label class="question-filter-label">Level</label>
      <select class="question-filter-select" [value]="selectedLevel" (change)="onLevelChange($any($event.target).value)">
        <option value="">Select Level</option>
        <option *ngFor="let lvl of levels" [value]="lvl.level_tr">{{ lvl.label }}</option>
      </select>
    </div>
    <div class="question-filter-item" *ngIf="classes.length > 1">
      <label class="question-filter-label">Class</label>
      <select class="question-filter-select" [value]="selectedClass" (change)="onClassChange($any($event.target).value)">
        <option value="">Select Class</option>
        <option *ngFor="let c of classes" [value]="c.value">{{ c.label }}</option>
      </select>
    </div>
    <div class="question-filter-item" *ngIf="groups.length > 0">
      <label class="question-filter-label">Group</label>
      <select class="question-filter-select" [value]="selectedGroup" (change)="onGroupChange($any($event.target).value)">
        <option value="">Select Group</option>
        <option *ngFor="let g of groups" [value]="g">{{ g }}</option>
      </select>
    </div>
    <!-- Subject: single-select dropdown -->
    <div class="question-filter-item" *ngIf="selectedLevel && (classes.length <= 1 || selectedClass) && subjects.length > 0">
      <label class="question-filter-label">Subject</label>
      <select class="question-filter-select" [value]="selectedSubjectTr" (change)="onSubjectChange($any($event.target).value)">
        <option value="">Select Subject</option>
        <option *ngFor="let sub of subjects" [value]="sub.subject_tr">{{ sub.name || sub.subject_tr }}</option>
      </select>
    </div>
    <!-- Chapter: first option Select All; checkboxes on left; multi-select -->
    <div class="question-filter-item filter-dropdown-wrap" *ngIf="primarySubject && chapters.length > 0">
      <label class="question-filter-label">Chapter</label>
      <div class="filter-dropdown">
        <button type="button" class="filter-dropdown-btn" (click)="toggleChapterDropdown()" [title]="selectedChapterName">
          <span class="filter-dropdown-btn-label">{{ selectedChapterName }}</span>
          <span class="filter-dropdown-arrow">▼</span>
        </button>
        <div class="filter-dropdown-panel" *ngIf="chapterDropdownOpen">
          <label class="filter-dropdown-item filter-dropdown-item-selectall" (click)="onChapterSelectAllToggle(); $event.preventDefault()">
            <input type="checkbox" [checked]="allChaptersSelected" (click)="$event.preventDefault()" />
            <span>Select All</span>
          </label>
          <label *ngFor="let ch of chapters" class="filter-dropdown-item" (click)="onChapterSelect(ch.id); $event.preventDefault()">
            <input type="checkbox" [checked]="selectedChapterIds.has(ch.id)" (click)="$event.preventDefault()" />
            <span>{{ ch.name }}</span>
          </label>
        </div>
      </div>
    </div>
    <!-- Topic: first option Select All; checkboxes on left; multi-select -->
    <div class="question-filter-item filter-dropdown-wrap" *ngIf="primarySubject && topics.length > 0">
      <label class="question-filter-label">Topic</label>
      <div class="filter-dropdown">
        <button type="button" class="filter-dropdown-btn" (click)="toggleTopicDropdown()" [title]="selectedTopicName">
          <span class="filter-dropdown-btn-label">{{ selectedTopicName }}</span>
          <span class="filter-dropdown-arrow">▼</span>
        </button>
        <div class="filter-dropdown-panel" *ngIf="topicDropdownOpen">
          <label class="filter-dropdown-item filter-dropdown-item-selectall" (click)="onTopicSelectAllToggle(); $event.preventDefault()">
            <input type="checkbox" [checked]="allTopicsSelected" (click)="$event.preventDefault()" />
            <span>Select All</span>
          </label>
          <label *ngFor="let t of topics" class="filter-dropdown-item" (click)="onTopicSelect(t.id); $event.preventDefault()">
            <input type="checkbox" [checked]="selectedTopicIds.has(t.id)" (click)="$event.preventDefault()" />
            <span>{{ t.name }}</span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <!-- Questions for selected topic(s): user selects which questions to use -->
  <div class="topic-questions-section" *ngIf="selectedTopicIds.size > 0 && topicQuestions.length > 0">
    <div class="topic-questions-header">
      <h3>Questions for selected topic</h3>
      <div class="topic-questions-actions">
        <button type="button" class="btn-link" (click)="selectAllTopicQuestions()">Select all</button>
        <span class="sep">|</span>
        <button type="button" class="btn-link" (click)="clearTopicQuestionSelection()">Clear selection</button>
        <span class="selected-count">{{ selectedQuestionIds?.size ?? 0 }} selected</span>
      </div>
    </div>
    <ul class="topic-questions-list">
      <li *ngFor="let q of topicQuestions" class="topic-question-item">
        <label class="topic-question-label" (click)="toggleQuestionSelection(q.id); $event.preventDefault()">
          <input type="checkbox" [checked]="isQuestionSelected(q.id)" (click)="$event.preventDefault(); $event.stopPropagation(); toggleQuestionSelection(q.id)" />
          <span class="topic-question-text">{{ q.question }}</span>
        </label>
        <div class="topic-question-options" *ngIf="q.option_1 || q.option_2">
          <span *ngIf="q.option_1">A: {{ q.option_1 }}</span>
          <span *ngIf="q.option_2"> B: {{ q.option_2 }}</span>
          <span *ngIf="q.option_3"> C: {{ q.option_3 }}</span>
          <span *ngIf="q.option_4"> D: {{ q.option_4 }}</span>
        </div>
      </li>
    </ul>
  </div>
  <p *ngIf="selectedTopicIds.size > 0 && topicQuestionsLoaded && topicQuestions.length === 0 && !isFormMode" class="no-topic-questions">No questions found for selected topic(s).</p>

  <div class="question-layout">
    <main class="main-content">
      <app-questionform
        *ngIf="isFormMode && (!isEditRoute || editQuestion !== null)"
        [question]="editQuestion"
        [subject]="currentSubject"
        [chapter]="currentChapter"
        (save)="onSaveQuestion($event)"
        (cancel)="onCancelForm()"
      ></app-questionform>

      <ng-container *ngIf="!isFormMode">
        <div class="action-bar">
          <app-searchbar (searchChange)="onSearch($any($event))"></app-searchbar>
          <button class="btn-primary create-btn" (click)="onCreateQuestion()">
            <i class="fa fa-plus"></i> Create Question
          </button>
        </div>

        <app-questionlist
          [questions]="questions"
          [currentPage]="currentPage"
          [totalPages]="totalPages"
          (pageChange)="onPageChange($any($event))"
          (questionSelect)="onQuestionSelect($any($event))"
          (questionDelete)="onQuestionDelete($any($event))"
        ></app-questionlist>
      </ng-container>
    </main>
  </div>

  <!-- Fixed floating buttons: 100px from bottom. >539px: single row; <=539px: stacked (Smart on top, Create below) -->
  <div class="fab-wrapper">
    <button
      type="button"
      class="fab-btn fab-smart"
      (click)="onSmartQuestionCreator()"
      title="Smart Question Creator"
    >
      Smart Question Creator
    </button>
    <button
      *ngIf="selectedCount > 0"
      type="button"
      class="fab-btn fab-create"
      (click)="goToCreateQuestion()"
      title="Create question set with selected questions"
    >
      Create Question ({{ selectedCount }} Selected)
    </button>
  </div>
</div>
