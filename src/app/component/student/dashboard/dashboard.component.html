<div class="dashboard-container">
  <h1 class="dashboard-title">Student Dashboard</h1>
  
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-value">{{ stats.examsCompleted }}</div>
      <div class="stat-label">Exams Completed</div>
    </div>
    
    <div class="stat-box">
      <div class="stat-value">{{ stats.averageScore }}%</div>
      <div class="stat-label">Average Score</div>
    </div>
    
    <div class="stat-box">
      <div class="stat-value">#{{ stats.currentRank }}</div>
      <div class="stat-label">Current Rank</div>
    </div>
    
    <div class="stat-box">
      <div class="stat-value">{{ stats.loginStreak }}</div>
      <div class="stat-label">Login Streak (Days)</div>
    </div>
  </div>

  <div class="quick-actions">
    <h2>Quick Actions</h2>
    <div class="action-buttons">
      <button class="btn-student-primary" [routerLink]="['/student/liveexam']">
        <i class="fa fa-play-circle"></i> Live Exams
      </button>
      <button class="btn-student-primary" [routerLink]="['/student/archive']">
        <i class="fa fa-archive"></i> Practice Exams
      </button>
      <button class="btn-student-secondary" [routerLink]="['/student/report']">
        <i class="fa fa-chart-line"></i> Reports
      </button>
      <button class="btn-student-secondary" [routerLink]="['/student/stats']">
        <i class="fa fa-trophy"></i> Stats & Achievements
      </button>
      <button class="btn-student-secondary" [routerLink]="['/student/leaderboard']">
        <i class="fa fa-users"></i> Leaderboard
      </button>
      <button class="btn-student-secondary" [routerLink]="['/student/tutor']">
        <i class="fa fa-graduation-cap"></i> AI Tutor
      </button>
    </div>
  </div>
</div>
