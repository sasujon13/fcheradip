<div class="archive-container">
  <h1 class="page-title">Practice Exams (Archive)</h1>
  
  <div class="filters-section">
    <select [(ngModel)]="selectedLevel" (change)="onFilterChange()" class="filter-select">
      <option value="">All Levels</option>
      <option *ngFor="let level of levels" [value]="level">{{ level }}</option>
    </select>
    
    <select [(ngModel)]="selectedGroup" (change)="onFilterChange()" class="filter-select">
      <option value="">All Groups</option>
      <option value="S">Science</option>
      <option value="A">Humanities</option>
      <option value="B">Business</option>
      <option value="I">Islamic Studies</option>
      <option value="H">Home Economics</option>
      <option value="M">Music</option>
    </select>
    
    <select [(ngModel)]="selectedType" (change)="onFilterChange()" class="filter-select">
      <option value="">All Types</option>
      <option *ngFor="let type of examTypes" [value]="type.value">{{ type.label }}</option>
    </select>
  </div>

  <div class="exams-list">
    <div *ngFor="let exam of exams" class="exam-card">
      <div class="exam-header">
        <h3 class="exam-title">{{ exam.subject_name }} ({{ exam.subject_code }})</h3>
        <span class="badge badge-primary">{{ exam.type }} Questions</span>
      </div>
      
      <div class="exam-meta">
        <span><i class="fa fa-clock-o"></i> Duration: {{ exam.duration }} minutes</span>
        <span *ngIf="exam.previous_score">
          <i class="fa fa-star"></i> Previous Score: {{ exam.previous_score }}%
        </span>
      </div>
      
      <button class="btn-student-primary" [routerLink]="['/student/exam', exam.id]">
        Take Exam
      </button>
    </div>
  </div>
</div>
