<!doctype html>
<html lang="en">

<head>
    <!-- Run first: apply saved language; two-step translation (to en then to target) for accuracy -->
    <script>
      (function() {
        try {
          var viaEnTarget = localStorage.getItem('translateViaEnglishTarget');
          if (viaEnTarget) {
            document.cookie = 'googtrans=/en/' + viaEnTarget + '; path=/; max-age=31536000';
            localStorage.removeItem('translateViaEnglishTarget');
            window.location.reload();
            return;
          }
          var lang = localStorage.getItem('preferred_lang') || '';
          if (lang && lang !== 'en' && lang !== 'original') {
            var gt = document.cookie.match(/googtrans=([^;]*)/);
            var current = (gt && gt[1]) ? gt[1] : '';
            if (current !== '/en/' + lang) {
              localStorage.setItem('translateViaEnglishTarget', lang);
              document.cookie = 'googtrans=/bn/en; path=/; max-age=31536000';
              window.location.reload();
              return;
            }
          }
          if (lang === 'original' || lang === 'en') {
            document.cookie = 'googtrans=; path=/; max-age=0';
          }
        } catch (e) {}
      })();
    </script>
